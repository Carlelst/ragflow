<!DOCTYPE html>
<html lang="zh-CN">
<head    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAGFlow 数据导入与处理管道架构图 v2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1700px; width: 100%; }
        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 8px;
            color: #64b5f6;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .svg-wrapper {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            overflow-x: auto;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
            text-align: center;
        }
        .svg-wrapper img, .svg-wrapper object {
            max-width: 100%;
            height: auto;
        }
        .meta {
            margin-top: 16px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .meta .chip {
            background: #2a2a3e;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 13px;
            color: #aaa;
        }
        .meta .chip strong { color: #eee; }
    </style>
</head>
<body>
    <div class="container">
        <h1>RAGFlow 数据导入与处理管道架构 v2</h1>
        <p class="subtitle">新增: 增量更新链路 + Dify↔RAGFlow HTTP API 集成方式</p>
        <div class="svg-wrapper">
            <object data="ragflow-import-pipeline.svg?v2" type="image/svg+xml">
                <img src="ragflow-import-pipeline.svg?v2" alt="RAGFlow 架构图 v2">
            </object>
        </div>
        <div class="meta">
            <div class="chip"><strong>📁 本地路径</strong> diagrams/ragflow-import-pipeline.svg</div>
            <div class="chip"><strong>🌐 访问</strong> http://192.168.20.21:8899/ragflow-import-pipeline.html</div>
            <div class="chip"><strong>📐 版本</strong> v2 (含增量更新 + Dify集成)</div>
            <div class="chip"><strong>💾 备份</strong> diagrams/backups/</div>
        </div>
    </div>
</body>
</html>
